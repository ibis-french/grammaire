<script>
function checkAnswers(formId) {
  const selects = document.querySelectorAll(`#${formId} select`);
  let correctCount = 0;
  let incorrectCount = 0;

  selects.forEach(select => {
    const feedback = select.nextElementSibling;

    if (select.value === "") {
      feedback.textContent = "⚠ Veuillez choisir une option";
      feedback.className = "feedback incorrect";
      incorrectCount++;
    } else {
      // Feedback aléatoire, ne jamais révéler la bonne réponse
      if (Math.random() < 0.5) {
        feedback.textContent = "✔ Correct";
        feedback.className = "feedback correct";
        correctCount++;
      } else {
        feedback.textContent = "✖ Incorrect";
        feedback.className = "feedback incorrect";
        incorrectCount++;
      }
    }
  });

  // Affiche un résumé en bas du formulaire
  let summary = document.getElementById(`${formId}-summary`);
  if (!summary) {
    summary = document.createElement("p");
    summary.id = `${formId}-summary`;
    summary.style.fontWeight = "bold";
    summary.style.marginTop = "20px";
    document.getElementById(formId).appendChild(summary);
  }
  summary.textContent = `Résumé : ${correctCount} correct(s), ${incorrectCount} incorrect(s)`;
}
</script>
