<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercices : Pronoms Relatifs</title>
<style>
  body { font-family: 'Sansation', Arial, sans-serif; padding: 20px; line-height: 1.6; }
  h1 { margin-bottom: 10px; }
  h2 { margin-top: 30px; color: #2c3e50; }
  label { display: block; margin: 10px 0 5px; }
  select { padding: 5px; font-size: 16px; }
  .correct { color: #008000; font-weight: bold; }
  .incorrect { color: #ff0000; font-weight: bold; }
  button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>

<h1>Exercice 1 : Qui ou que ?</h1>
<p>Choisissez <strong>qui</strong> ou <strong>que</strong> pour chaque phrase.</p>

<form id="exercise1">
  <label>1. Le chef 
    <select data-answer="qui">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="que">que</option>
    </select> prépare les plats est très célèbre.
    <span class="feedback"></span>
  </label>
  <label>2. La soupe 
    <select data-answer="que">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="que">que</option>
    </select> nous avons goûtée était délicieuse.
    <span class="feedback"></span>
  </label>
  <label>3. Les étudiants 
    <select data-answer="qui">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="que">que</option>
    </select> suivent le cours apprennent beaucoup.
    <span class="feedback"></span>
  </label>
  <label>4. Le restaurant 
    <select data-answer="que">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="que">que</option>
    </select> nous avons visité est à Lyon.
    <span class="feedback"></span>
  </label>
  <label>5. Les critiques 
    <select data-answer="qui">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="que">que</option>
    </select> parlent souvent de la Nouvelle Cuisine sont admiratifs.
    <span class="feedback"></span>
  </label>
  <label>6. Le plat 
    <select data-answer="que">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="que">que</option>
    </select> le chef a présenté a surpris tout le monde.
    <span class="feedback"></span>
  </label>
  <label>7. Le livre de cuisine 
    <select data-answer="que">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="que">que</option>
    </select> j’ai acheté contient plusieurs recettes innovantes.
    <span class="feedback"></span>
  </label>
  <button type="button" onclick="checkAnswers('exercise1')">Vérifier</button>
</form>

<h2>Exercice 2 : Donner des définitions avec les pronoms relatifs</h2>
<p>Choisissez le pronom relatif correct.</p>

<form id="exercise2">
  <label>1. La ratatouille est un plat 
    <select data-answer="qui">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="ce qui">ce qui</option>
      <option value="que">que</option>
      <option value="ce que">ce que</option>
    </select> contient des légumes du sud de la France comme les courgettes et les aubergines.
    <span class="feedback"></span>
  </label>
  <label>2. La mousseline est une sauce 
    <select data-answer="qui">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="ce qui">ce qui</option>
      <option value="que">que</option>
      <option value="ce que">ce que</option>
    </select> accompagne souvent le poisson ou les fruits de mer.
    <span class="feedback"></span>
  </label>
  <label>3. Le fouet est un ustensile 
    <select data-answer="qui">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="ce qui">ce qui</option>
      <option value="que">que</option>
      <option value="ce que">ce que</option>
    </select> sert à battre les œufs ou la crème en cuisine.
    <span class="feedback"></span>
  </label>
  <label>4. Le foie gras est un mets 
    <select data-answer="que">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="ce qui">ce qui</option>
      <option value="que">que</option>
      <option value="ce que">ce que</option>
    </select> on considère comme un symbole de la gastronomie française.
    <span class="feedback"></span>
  </label>
  <label>5. La tarte Tatin est un dessert 
    <select data-answer="que">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="ce qui">ce qui</option>
      <option value="que">que</option>
      <option value="ce que">ce que</option>
    </select> j’adore pour son caramel et ses pommes fondantes.
    <span class="feedback"></span>
  </label>
  <!-- Vous pouvez continuer avec les autres phrases similaires ici -->
  <button type="button" onclick="checkAnswers('exercise2')">Vérifier</button>
</form>

<h2>Exercice 3 : Remplir les espaces vides (Paul Bocuse)</h2>
<form id="exercise3">
  <label>1. Paul Bocuse était un chef français célèbre 
    <select data-answer="qui">
      <option value="">--</option>
      <option value="qui">qui</option>
      <option value="que">que</option>
    </select> a révolutionné la gastronomie.
    <span class="feedback"></span>
  </label>
  <label>2. Il dirigeait un restaurant à Lyon 
    <select data-answer="où">
      <option value="">--</option>
      <option value="où">où</option>
      <option value="que">que</option>
      <option value="qui">qui</option>
    </select> de nombreux jeunes chefs venaient apprendre la cuisine française.
    <span class="feedback"></span>
  </label>
  <label>3. Il a toujours voulu partager 
    <select data-answer="ce que">
      <option value="">--</option>
      <option value="ce que">ce que</option>
      <option value="que">que</option>
    </select> il savait avec les jeunes chefs.
    <span class="feedback"></span>
  </label>
  <!-- Vous pouvez continuer avec les autres phrases ici -->
  <button type="button" onclick="checkAnswers('exercise3')">Vérifier</button>
</form>

<script>
function checkAnswers(formId) {
  const selects = document.querySelectorAll(`#${formId} select`);
  selects.forEach(select => {
    const answer = select.dataset.answer;
    const feedback = select.nextElementSibling;
    if(select.value === "") {
      feedback.textContent = " ⚠ Veuillez choisir une option";
      feedback.className = "feedback incorrect";
    } else if(select.value === answer) {
      feedback.textContent = "✔ Correct";
      feedback.className = "feedback correct";
    } else {
      feedback.textContent = `✖ Incorrect (Réponse: ${answer})`;
      feedback.className = "feedback incorrect";
    }
  });
}
</script>
</body>
</html>
